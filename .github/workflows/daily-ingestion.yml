# Daily corpus refresh — see docs/architecture.md §2.2
name: Daily MF corpus refresh

on:
  schedule:
    # 10:00 Asia/Kolkata (IST): 04:30 UTC — see docs/architecture.md §2.2
    - cron: "30 4 * * *"
  workflow_dispatch: {}

concurrency:
  group: ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
      PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
      PINECONE_INDEX: ${{ secrets.PINECONE_INDEX }}
      PINECONE_NAMESPACE: ${{ secrets.PINECONE_NAMESPACE }}
      PINECONE_CLOUD: ${{ secrets.PINECONE_CLOUD }}
      PINECONE_REGION: ${{ secrets.PINECONE_REGION }}
      PINECONE_HOST: ${{ secrets.PINECONE_HOST }}
      EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
      # Wipe Pinecone namespace before upsert so only the latest run’s vectors exist.
      PINECONE_REPLACE_NAMESPACE: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # - name: Install Playwright browser
      #   run: playwright install chromium

      - name: Run full ingestion
        run: python scripts/run_full_ingestion.py

      - uses: actions/upload-artifact@v4
        with:
          name: raw-and-processed
          retention-days: 1
          path: |
            data/raw
            data/processed
