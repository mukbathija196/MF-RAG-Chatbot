# Render Blueprint — MF FAQ Chatbot API
# https://render.com/docs/blueprint-spec
#
# Deploy: Dashboard → New → Blueprint → select this repo → apply.
# Set secret values in the Render UI for every env var with sync: false.

services:
  - type: web
    name: mf-faq-api
    runtime: python
    region: oregon
    plan: starter
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      # Secrets — Render prompts for these on first apply (or set under Environment).
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      # Optional: add PINECONE_HOST in the dashboard if you use host-based Pinecone.
      # Optional non-defaults (edit in dashboard if different).
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: PINECONE_INDEX
        value: mf-faq-chunks
      - key: PINECONE_NAMESPACE
        value: mf-faq-active
      - key: PINECONE_CLOUD
        value: aws
      - key: PINECONE_REGION
        value: us-east-1
      - key: EMBEDDING_MODEL
        value: llama-text-embed-v2
      # Cross-encoder is heavy; keep off on small instances unless you need it.
      - key: ENABLE_CROSS_ENCODER
        value: "0"
